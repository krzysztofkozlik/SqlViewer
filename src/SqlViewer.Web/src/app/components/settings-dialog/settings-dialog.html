<h2 mat-dialog-title>Settings</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Long-running query threshold</mat-label>
    <input
      matInput
      type="number"
      min="1"
      [value]="thresholdMs()"
      (change)="onThresholdChange($event)">
    <span matSuffix>ms</span>
    <mat-hint>Queries exceeding this duration are flagged with a warning icon. Default: 1000ms.</mat-hint>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="save()">Save</button>
</mat-dialog-actions>
