<h2 mat-dialog-title>Settings</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Long-running query threshold</mat-label>
    <input
      matInput
      type="number"
      min="1"
      [value]="thresholdMs()"
      (change)="onThresholdChange($event)">
    <span matSuffix>ms</span>
    <mat-hint>Individual queries exceeding this duration are flagged with a <strong>⚠ warning</strong> icon. Default: 400ms.</mat-hint>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Slow request threshold (total SQL time)</mat-label>
    <input
      matInput
      type="number"
      min="1"
      [value]="slowRequestMs()"
      (change)="onSlowRequestChange($event)">
    <span matSuffix>ms</span>
    <mat-hint>Requests whose combined SQL time exceeds this are flagged with a <strong>⏱ timer</strong> icon. Default: 800ms.</mat-hint>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="save()">Save</button>
</mat-dialog-actions>
