<mat-toolbar>
  <span class="app-title">SQL Viewer</span>

  <span class="spacer"></span>

  <button
    mat-icon-button
    [disabled]="!isConnected() || displayState() === 'Listening'"
    (click)="monitoring.start()"
    matTooltip="Start"
    aria-label="Start">
    <mat-icon>play_arrow</mat-icon>
  </button>

  <button
    mat-icon-button
    [disabled]="!isConnected() || displayState() !== 'Listening'"
    (click)="monitoring.pause()"
    matTooltip="Pause"
    aria-label="Pause">
    <mat-icon>pause</mat-icon>
  </button>

  <button
    mat-icon-button
    [disabled]="!isConnected() || displayState() === 'Stopped'"
    (click)="monitoring.stop()"
    matTooltip="Stop"
    aria-label="Stop">
    <mat-icon>stop</mat-icon>
  </button>

  @if (monitoring.connectionState() === 'Disconnected') {
    <button
      mat-icon-button
      (click)="monitoring.reconnect()"
      matTooltip="Reconnect to backend"
      aria-label="Reconnect">
      <mat-icon>wifi</mat-icon>
    </button>
  }

  <button
    mat-icon-button
    (click)="monitoring.clear()"
    matTooltip="Clear list"
    aria-label="Clear list">
    <mat-icon>clear_all</mat-icon>
  </button>

  <button
    mat-icon-button
    (click)="openSettings()"
    matTooltip="Settings"
    aria-label="Settings">
    <mat-icon>settings</mat-icon>
  </button>

  <div class="status-area">
    <span class="state-badge state-{{ displayState().toLowerCase() }}">
      {{ displayState() }}
    </span>
  </div>
</mat-toolbar>
